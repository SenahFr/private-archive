<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Archive</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="layout">
    <section id="heroGrid" class="hero-grid page-grid">
      <section class="hero">
      <div class="title-lockup" aria-label="Let's Share In This Together less than three">
        <h1 class="title-line title-line-top">Let&apos;s Share In</h1>
        <h1 class="title-line title-line-bottom">This Together&lt;3</h1>
      </div>

      <div id="loginStrip" class="login-strip">
        <input id="username" placeholder="Username" autocomplete="username">
        <input id="password" type="password" placeholder="Password" autocomplete="current-password">
        <button class="login-button" type="button" onclick="login()">Login</button>
        <span class="login-copy">to post</span>
      </div>

      <p id="loginError" class="error-text"></p>

      <div class="account-links">
        <span id="currentUsernameLabel" class="account-username hidden"></span>
        <div class="account-actions">
          <button id="settingsLink" class="link-button hidden" type="button">Settings</button>
          <button id="logoutLink" class="link-button hidden" type="button">Logout</button>
        </div>
      </div>

      <section id="settingsDropdown" class="settings-panel hidden">
        <h3>Account Settings</h3>
        <form id="updateSettingsForm" class="settings-form">
          <label for="newUsername">New Username</label>
          <input type="text" id="newUsername" name="newUsername" placeholder="Optional">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" name="newPassword" placeholder="Optional">
          <label for="currentPassword">Current Password</label>
          <input type="password" id="currentPassword" name="currentPassword" required>
          <button class="login-button" type="submit">Update</button>
        </form>
      </section>
          </section>
      <div class="hero-spacer" aria-hidden="true"></div>
    </section>

    <section id="mainGrid" class="main-grid page-grid">
      <section class="feed-column">
        <h2>Feed</h2>
        <div class="section-rule"></div>
        <section id="feed" class="feed"></section>
      </section>

      <aside class="side-column">
        <section id="createColumn" class="create-column hidden">
          <h2>Create Post</h2>
          <div class="section-rule"></div>

          <section id="composer" class="composer hidden">
            <label for="subjectPost">Subject</label>
            <input type="text" id="subjectPost" placeholder="Add subject">

            <label for="textPost">The Text</label>
            <textarea id="textPost" rows="3" placeholder="Write something..."></textarea>

            <div class="composer-row">
              <input type="file" id="mediaInput" accept="image/*,video/*">
            </div>
            <button id="createPostButton" class="composer-post-button" type="button">Post</button>
          </section>
        </section>

        <section class="about-column">
          <h2>About</h2>
          <div class="section-rule"></div>
          <p>
            Media feed of the creative correspondence between Senah and her friend Azahar.
            If you want to be our friend <strong><u>just say so</u></strong>.
          </p>
          <div class="section-rule"></div>
          <div class="about-links">
            <a href="#">Test</a>
            <a href="#">March 2026</a>
          </div>
        </section>
      </aside>
    </section>

    <aside id="adminPanel" class="admin-panel hidden">
      <h3>Pending Users</h3>
      <ul id="pendingUsersList"></ul>
    </aside>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
